# Netlify build + deploy config for futures-btf

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — every unknown URL serves index.html so React Router handles it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the hashed asset bundles Vite emits.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
